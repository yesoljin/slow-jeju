    function crowdLevel(rate) {
      if (rate === null || rate === undefined) return { key: "none", label: "예측 없음", color: "#9aa7ab" };
      if (rate < 20) return { key: "relaxed", label: "여유", color: "#238f7a" };
      if (rate < 40) return { key: "normal-low", label: "보통·여유", color: "#75a94f" };

      if (rate < 80) return { key: "busy", label: "혼잡", color: "#e57a36" };
      return { key: "very-busy", label: "매우 혼잡", color: "#d94f4f" };
    }

    function averageRate(place) {
      if (!place.forecast.length) return null;
      return place.forecast.reduce((sum, item) => sum + item.rate, 0) / place.forecast.length;
    }

    function rateFor(place, date) {
      if (!date) return averageRate(place);
      return place.forecast.find((item) => item.date === date)?.rate ?? null;
    }

    function formatDate(date) {
      if (!date) return "날짜 미정";
      return `${Number(date.slice(4, 6))}월 ${Number(date.slice(6, 8))}일`;
    }

    function dateObject(date) {
      return new Date(Number(date.slice(0, 4)), Number(date.slice(4, 6)) - 1, Number(date.slice(6, 8)), 12);
    }

    function calendarGroups(forecast) {
      const groups = new Map();
      forecast.forEach((item) => {
        const key = item.date.slice(0, 6);
        groups.set(key, [...(groups.get(key) ?? []), item]);
      });
      return [...groups.entries()];
    }

    function selectedPlace() {
      return places.find((place) => place.id === state.selectedId) ?? places[0];
    }

    function originPlace() {
      return places.find((place) => place.id === state.originId) ?? selectedPlace();
    }

    function getComparison() {
      const selected = selectedPlace();
      const origin = originPlace();
      if (!state.activeDate || !selected.forecast.length) return null;
      const isAlternative = origin.id !== selected.id;
      let beforeRate;
      let beforeDateLabel;

      if (state.initialDate) {
        beforeRate = rateFor(origin, state.initialDate);
        beforeDateLabel = formatDate(state.initialDate);
      } else if (isAlternative) {
        beforeRate = rateFor(origin, state.activeDate);
        beforeDateLabel = formatDate(state.activeDate);
      } else {
        beforeRate = averageRate(origin);
        beforeDateLabel = "30일 평균";
      }

      const afterRate = rateFor(selected, state.activeDate);
      if (beforeRate === null || afterRate === null || beforeRate === 0) return null;
      return {
        beforeRate,
        afterRate,
        reduction: ((beforeRate - afterRate) / beforeRate) * 100,
        beforeDateLabel,
        afterDateLabel: formatDate(state.activeDate),
      };
    }

    function renderMapPins(visiblePlaces, relationIds, origin) {

    function renderCalendar(selected) {

      return calendarGroups(selected.forecast).map(([month, items]) => {
        const firstDay = dateObject(items[0].date).getDay();
        const title = `${Number(month.slice(4, 6))}월 ${Number(items[0].date.slice(6, 8))}일–${Number(items.at(-1).date.slice(6, 8))}일`;
        const blanks = Array.from({ length: firstDay }, (_, index) => `<span class="calendar-blank" aria-hidden="true" data-blank="${index}"></span>`).join("");

          const level = crowdLevel(item.rate);

          return `<button class="${classes}" data-action="select-date" data-value="${item.date}" title="${formatDate(item.date)} ${item.rate.toFixed(2)} ${level.label}">

        }).join("");
        return `<div class="calendar-month"><strong>${title}</strong><div class="weekday-row">${weekdays.map((day) => `<span>${day}</span>`).join("")}</div><div class="calendar-grid">${blanks}${days}</div></div>`;

          <section class="map-panel" aria-label="제주 관광지도">
            <div class="map-toolbar"><div><p class="section-kicker">제주 전역 31곳 샘플</p><h2>${state.showAlternatives ? `${escapeHtml(origin.name)}의 연관 대체지` : "어디로 떠나볼까요?"}</h2></div>
              <div class="segmented compact" role="group" aria-label="지도 보기 방식"><button class="${state.mapMode === "theme" ? "active" : ""}" data-action="map-mode" data-value="theme">테마</button><button class="${state.mapMode === "crowd" ? "active" : ""}" data-action="map-mode" data-value="crowd">붐빔</button></div>
            </div>
            ${state.showAlternatives ? `<div class="alternative-banner"><b>연관 대체지 ${relationIds.length}곳</b><span>핀을 눌러 30일 붐빔을 비교해 보세요.</span><button data-action="close-alternatives">대체지 닫기</button></div>` : themeButtons("filter-row")}
            <div class="map-canvas"><div class="island" aria-hidden="true"><span>한림</span><span>제주시</span><span>성산</span><span>서귀포</span><span>중문</span></div>${renderMapPins(visiblePlaces, relationIds, origin)}<div class="map-caption">실제 지도 대신 상대 위치를 표현한 시연용 지도입니다.</div></div>
            <div class="legend">${legend}</div>
          </section>
          <aside class="detail-panel" aria-label="선택 관광지 상세정보">
            <div class="place-heading"><div><span class="theme-badge">${themeMeta[selected.theme]?.icon ?? "◆"} ${selected.theme}</span><h2>${escapeHtml(selected.name)}</h2><p>${escapeHtml(selected.address)}</p></div>
              ${selected.forecast.length ? `<div class="current-crowd" style="--crowd:${selectedLevel.color}"><strong>${(selectedRate ?? averageRate(selected)).toFixed(2)}</strong><span>${state.activeDate ? selectedLevel.label : "30일 평균"}</span></div>` : `<span class="no-data-badge">집중률 예측 없음</span>`}
            </div>
            <section class="calendar-section"><div class="calendar-title"><div><p class="section-kicker">30일 붐빔 달력</p><h3>날짜별 여유를 한눈에</h3></div>${state.activeDate ? `<span class="selected-date">선택 · ${formatDate(state.activeDate)}</span>` : ""}</div>${renderCalendar(selected)}</section>
            ${comparisonStrip(comparison)}
            <details class="visitor-details"><summary>최근 7일 관광객 추이 <span>시연용 가상 데이터</span></summary><div class="visitor-chart">${selected.dailyVisitors.map((item) => `<div><span style="height:${Math.max(18, item.count / maxVisitor * 100)}%"></span><b>${item.count.toLocaleString()}</b><small>${item.label}</small></div>`).join("")}</div></details>
            <div class="detail-actions">${!state.showAlternatives
              ? `<button class="secondary-cta" data-action="show-related" ${selected.relations.length ? "" : "disabled"}>연관 대체지 지도에서 보기 <span>↗</span></button>`
              : `<button class="secondary-cta" data-action="back-origin">기준 장소로 돌아가기</button>`}
              ${comparison && comparison.reduction > 0 ? `<button class="primary-cta small" data-action="show-result">최종 결과 보기 <span>→</span></button>` : ""}
            </div>
            <p class="method-note">집중률 단계는 상대 예측값을 서비스에서 5단계로 나눈 자체 기준이며, 실시간 혼잡도나 실제 방문객 수를 의미하지 않습니다.</p>
          </aside>
        </section>
        <section class="source-strip"><span>사용 데이터</span><b>TourAPI 관광정보</b><b>30일 집중률 예측</b><b>연관 관광지</b><b class="mock">일일 관광객 · 시연용</b></section>
        ${renderResult(comparison, selected, origin)}
      </main>`;
    }

    function render() {
      if (state.started) renderApp(); else renderLanding();
    }

    function startExplore() {
      const nextDate = state.dateMode === "fixed" ? state.dateInput.replaceAll("-", "") : null;
      const first = state.theme === "전체" ? places[0] : places.find((place) => place.theme === state.theme) ?? places[0];
      state.initialDate = nextDate;
      state.activeDate = nextDate;
      state.mapMode = nextDate ? "crowd" : "theme";
      state.selectedId = first.id;
      state.originId = null;
      state.showAlternatives = false;
      state.started = true;
    }

    function reset() {
      state.started = false;
      state.showAlternatives = false;
      state.originId = null;
      state.showResult = false;
    }

    app.addEventListener("change", (event) => {
      if (event.target.matches('[data-action="date-input"]')) state.dateInput = event.target.value;
    });

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      const value = target.dataset.value;
      if (action === "date-mode") state.dateMode = value;
      if (action === "theme") state.theme = value;
      if (action === "start") startExplore();
      if (action === "reset") reset();
      if (action === "map-mode") state.mapMode = value;
      if (action === "select-place") state.selectedId = value;
      if (action === "select-date") { state.activeDate = value; state.mapMode = "crowd"; }
      if (action === "show-related") { state.originId = selectedPlace().id; state.showAlternatives = true; state.mapMode = state.activeDate ? "crowd" : "theme"; }
      if (action === "close-alternatives") { state.showAlternatives = false; state.selectedId = originPlace().id; }
      if (action === "back-origin") { state.selectedId = originPlace().id; state.showAlternatives = false; }
      if (action === "show-result") state.showResult = true;
      if (action === "close-result") {
        if (event.target.closest("[data-modal]") && !event.target.matches('[data-action="close-result"]')) return;
        state.showResult = false;
      }
      render();
    });

    render();
  </script>
</body>
</html>
